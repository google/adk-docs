name: Python Tests

on:
  push:
    branches:
      - main
    paths:
      - "samples/python/**"
      - ".github/workflows/python-tests.yaml"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "samples/python/**"
      - ".github/workflows/python-tests.yaml"
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  get_sample_dirs:
    runs-on: ubuntu-latest
    outputs:
      sample_dirs: ${{ steps.get_dirs.outputs.sample_dirs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Get Sample Directories
        id: get_dirs
        run: |
          SAMPLE_DIRS=$( find samples/python -type d -not -path "*/.venv*" -exec test -e '{}'/requirements.txt \; -print | jq -R -s -c 'split("\n") | map(select(. != ""))' )
          echo "sample_dirs=$SAMPLE_DIRS" >> $GITHUB_OUTPUT
          echo "SAMPLE_DIRS: $SAMPLE_DIRS"  # For debugging

  build:
    runs-on: ubuntu-latest
    needs:
      - get_sample_dirs
    if: ${{ needs.get_sample_dirs.outputs.sample_dirs != '[]' }}
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        sample_dir: ${{ fromJson(needs.get_sample_dirs.outputs.sample_dirs) }}
      fail-fast: false # Important: Don't stop if one matrix configuration fails

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage
          pip install -r ${MATRIX_SAMPLE_DIR}/requirements.txt
          pip install -r ${MATRIX_SAMPLE_DIR}/requirements-test.txt
        env:
          MATRIX_SAMPLE_DIR: ${{ matrix.sample_dir }}

      - name: Run pytest in ${{ matrix.sample_dir }}
        run: |
          cd ${MATRIX_SAMPLE_DIR}
          pytest | tee pytest.txt
        env:
          MATRIX_SAMPLE_DIR: ${{ matrix.sample_dir }}

      - name: Show failed tests and overall summary
        run: |
          grep -E "FAILED tests|ERROR tests|[0-9]+ passed," pytest.txt
          failed_count=$(grep -E "FAILED tests|ERROR tests" pytest.txt | wc -l | tr -d '[:space:]')
          if [[ $failed_count -gt 0 ]]; then
            echo "$failed_count failed lines found! Task failed."
            exit 1
          fi

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.sample_dir }}
          path: |
            pytest.txt
            ./htmlcov/
          retention-days: 30
        if: ${{ always() }}
