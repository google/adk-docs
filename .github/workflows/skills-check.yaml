name: Skills Snippet Validation on PR and Schedule

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'skills/**/*.md'
      - 'tools/skills/**'

  schedule:
    - cron: '0 3 * * 3'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.x

    - name: Install dependencies
      run: pip install -r tools/skills/requirements.txt

    - name: Validate all snippets
      run: |
        python tools/skills/validate_snippets.py

    - name: Validate all links
      run: |
        python tools/skills/validate_links.py

    - name: Validate all callback signatures
      run: |
        python tools/skills/validate_callback_signatures.py

    - name: Integration test for callbacks
      run: |
        python tools/skills/test_callback_snippets.py
