name: Skills Snippet Validation on PR and Schedule

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'skills/**/*.md'
      - 'tools/skills/**'

  schedule:
    - cron: '0 3 * * 3'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x

    - name: Install dependencies
      run: pip install -r tools/skills/requirements.txt

    # --- PR-Specific Checks ---

    - name: Get changed skills markdown files (PR only)
      if: github.event_name == 'pull_request'
      id: changed-files
      run: |
        CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- 'skills/**/*.md' | tr '\n' ' ')
        echo "changed_files=${CHANGED_FILES}" >> $GITHUB_OUTPUT
        echo "Detected changes in: ${CHANGED_FILES}"

    - name: Validate changed snippets (PR only)
      if: github.event_name == 'pull_request' && steps.changed-files.outputs.changed_files != ''
      run: |
        python tools/skills/validate_snippets.py ${{ steps.changed-files.outputs.changed_files }}

    - name: Validate links in changed files (PR only)
      if: github.event_name == 'pull_request' && steps.changed-files.outputs.changed_files != ''
      run: |
        python tools/skills/validate_links.py ${{ steps.changed-files.outputs.changed_files }}

    # --- Scheduled Checks ---

    - name: Validate all snippets (Scheduled)
      if: github.event_name == 'schedule'
      run: |
        python tools/skills/validate_snippets.py

    - name: Validate all links (Scheduled)
      if: github.event_name == 'schedule'
      run: |
        python tools/skills/validate_links.py
